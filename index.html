<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Raghuvendra Kumar Portfolio</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%; overflow: hidden;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      display: block;
      background-color: #000;
    }
    .card {
      position: relative;
      z-index: 10;
      max-width: 380px;
      background: rgba(0,0,0,0.75);
      padding: 30px 25px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(255,255,255,0.2);
      text-align: center;
    }
    .card h2 {
      margin: 0 0 10px;
      font-weight: 700;
      font-size: 28px;
      color: #0af;
      text-shadow: 0 0 8px #33aaff;
    }
    .card p {
      margin: 0 0 25px;
      color: #bbb;
      font-size: 16px;
    }
    .links a {
      color: #0af;
      text-decoration: none;
      margin: 0 12px;
      font-weight: 600;
      font-size: 16px;
      border: 1.5px solid #0af;
      padding: 6px 14px;
      border-radius: 8px;
      transition: all 0.3s ease;
      display: inline-block;
      box-shadow: 0 0 15px #0af55a33;
    }
    .links a:hover {
      background: #0af;
      color: #000;
      box-shadow: 0 0 15px #0af;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="card">
    <h2>Raghuvendra Kumar</h2>
    <p>B.Tech AIML Student | Developer</p>
    <div class="links" id="links"></div>
  </div>

<script>
  // Social links array and dynamic insertion
  const profiles = [
    { name: "GitHub", url: "https://github.com/raghuvendra34" },
    { name: "LinkedIn", url: "https://www.linkedin.com/in/raghuvendra-kumar-76919128a/" },
    { name: "LeetCode", url: "https://leetcode.com/u/raghuvendra_34" },
    { name: "Codeforces", url: "https://codeforces.com/profile/raghuvendrakumar34" }
  ];

  const container = document.getElementById('links');
  profiles.forEach(profile => {
    const a = document.createElement('a');
    a.href = profile.url;
    a.target = "_blank";
    a.textContent = profile.name;
    container.appendChild(a);
  });

  // Canvas constellation animation with gyroscope / mouse interactivity
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let width, height;

  function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
  }
  window.addEventListener('resize', resize);
  resize();

  class Star {
    constructor() {
      this.x = Math.random() * width;
      this.y = Math.random() * height;
      this.radius = Math.random() * 1.2 + 0.5;
      this.baseX = this.x;
      this.baseY = this.y;
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fillStyle = '#0af';
      ctx.shadowColor = '#33aaff';
      ctx.shadowBlur = 8;
      ctx.fill();
    }
    update(offsetX = 0, offsetY = 0) {
      this.x = this.baseX + offsetX * 40;
      this.y = this.baseY + offsetY * 40;
    }
  }

  const starCount = Math.min(120, Math.floor(width / 6));
  const stars = [];
  for(let i=0; i < starCount; i++){
    stars.push(new Star());
  }

  function connectStars() {
    let maxDistance = 150;
    for(let i=0; i < stars.length; i++) {
      for(let j=i+1; j < stars.length; j++){
        let dx = stars[i].x - stars[j].x;
        let dy = stars[i].y - stars[j].y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < maxDistance) {
          ctx.beginPath();
          ctx.strokeStyle = 'rgba(0, 170, 255,' + (1 - dist / maxDistance) + ')';
          ctx.lineWidth = 1;
          ctx.moveTo(stars[i].x, stars[i].y);
          ctx.lineTo(stars[j].x, stars[j].y);
          ctx.shadowBlur = 10;
          ctx.shadowColor = '#0af';
          ctx.stroke();
          ctx.shadowBlur = 0;
        }
      }
    }
  }

  let offsetX = 0;
  let offsetY = 0;

  function animate() {
    ctx.clearRect(0, 0, width, height);
    stars.forEach(star => star.update(offsetX, offsetY));
    stars.forEach(star => star.draw());
    connectStars();
    requestAnimationFrame(animate);
  }

  window.addEventListener('deviceorientation', (event) => {
    offsetX = (event.gamma || 0) / 45;
    offsetY = (event.beta || 0) / 45;
  });

  window.addEventListener('mousemove', (e) => {
    offsetX = ((e.clientX / width) - 0.5) * 2;
    offsetY = ((e.clientY / height) - 0.5) * 2;
  });

  animate();
</script>
</body>
</html>
